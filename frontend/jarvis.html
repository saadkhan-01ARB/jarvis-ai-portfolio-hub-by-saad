<!DOCTYPE html>
<html>
<head>
<title>JARVIS AI FINAL</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #050816, black);
    color: white;
}

/* HEADER */
h1 {
    text-align: center;
    color: #00f7ff;
}

/* CHAT */
#chat {
    height: 70vh;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* MESSAGE */
.msg {
    padding: 10px;
    border-radius: 15px;
    max-width: 60%;
    animation: fade 0.3s ease-in;
}

.user {
    background: #00f7ff;
    color: black;
    align-self: flex-end;
}

.bot {
    background: rgba(255,255,255,0.08);
    border: 1px solid #00f7ff;
    align-self: flex-start;
}

/* INPUT */
.inputBox {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    padding: 10px;
    gap: 10px;
    background: rgba(0,0,0,0.8);
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: none;
}

button {
    padding: 12px;
    border-radius: 20px;
    border: none;
    background: #00f7ff;
    cursor: pointer;
}

/* LOADING */
.loading {
    font-style: italic;
    opacity: 0.6;
}

/* ANIMATION */
@keyframes fade {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<h1>🤖  JARVIS BY S A A D</h1>

<div id="chat"></div>

<div class="inputBox">
    <input id="cmd" placeholder="Ask anything...">
    <button onclick="send()">Send</button>
    <button onclick="voice()">🎤</button>
</div>

<script>

function add(text, type){
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

// SEND
function send(){
    let cmd = document.getElementById("cmd").value;
    if(!cmd) return;

    add(cmd, "user");
    document.getElementById("cmd").value = "";

    let loading = document.createElement("div");
    loading.className = "msg bot loading";
    loading.innerText = "Jarvis is thinking...";
    document.getElementById("chat").appendChild(loading);

    fetch("http://127.0.0.1:5000/jarvis", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({command: cmd})
    })
    .then(r => r.json())
    .then(d => {

        loading.remove();
        add(d.response, "bot");

        let speech = new SpeechSynthesisUtterance(d.response);
        window.speechSynthesis.speak(speech);
    });
}

// VOICE
function voice(){
    let rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    rec.lang = "en-US";
    rec.start();

    rec.onresult = function(e){
        let text = e.results[0][0].transcript;
        document.getElementById("cmd").value = text;
        send();
    };
}

</script>

</body>
</html>
