<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}

input {
    display: block;
    margin: 10px auto;
    padding: 10px;
}

button {
    padding: 10px 20px;
    background: #00f7ff;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Admin Login</h1>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<script>
function login() {
    fetch("http://127.0.0.1:5000/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: document.getElementById("user").value,
            password: document.getElementById("pass").value
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            alert("Login success");
            window.location.href = "admin.html";
        } else {
            alert("Wrong credentials");
        }
    });
}
</script>

</body>
</html>
