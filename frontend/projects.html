<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Projects | TECH HUB</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* =======================
   PAGE TRANSITIONS
======================= */
body {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
}

body.loaded {
    opacity: 1;
    transform: translateY(0);
}

body.fade-out {
    opacity: 0;
    transform: translateY(-20px);
}

/* =======================
   GLOBAL
======================= */
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    background: radial-gradient(circle at top, #050816, #000000);
    overflow-x: hidden;
}

/* =======================
   BACKGROUND FIX
======================= */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: url('https://raw.githubusercontent.com/VincentGarreau/particles.js/master/demo/media/star.png');
    opacity: 0.15;
    animation: starMove 120s linear infinite;
    pointer-events: none;
}

@keyframes starMove {
    from { transform: translate(0,0); }
    to { transform: translate(-1000px, -2000px); }
}

/* =======================
   CONTENT LAYER
======================= */
header, .projects, footer {
    position: relative;
    z-index: 2;
}

/* =======================
   HEADER
======================= */
header {
    text-align: center;
    padding: 40px;
}

header h1 {
    color: #00f7ff;
    text-shadow: 0 0 15px #00f7ff;
}

/* NAV */
nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    border: 1px solid #00f7ff;
    padding: 8px 14px;
    border-radius: 20px;
    transition: 0.3s;
}

nav a:hover {
    background: #00f7ff;
    color: black;
    box-shadow: 0 0 20px #00f7ff;
}

/* =======================
   PROJECT GRID
======================= */
.projects {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 25px;
    margin-top: 60px;
}

/* CARD */
.card {
    width: 260px;
    padding: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid #00f7ff;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 15px #00f7ff;
    transition: 0.4s;
    cursor: pointer;
}

/* hover */
.card:hover {
    transform: translateY(-12px) scale(1.05);
    box-shadow: 0 0 30px #ff00ff;
    border-color: #ff00ff;
}

.card h3 {
    color: #00f7ff;
}

/* =======================
   FOOTER
======================= */
footer {
    text-align: center;
    margin-top: 80px;
    padding: 20px;
    color: #666;
}

</style>
</head>

<body>

<header>
    <h1>📂 My Projects</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="projects.html">Projects</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="projects">

    <div class="card" onclick="openProject('jarvis')">
        <h3>🤖 Jarvis AI</h3>
        <p>Voice assistant with automation features.</p>
    </div>

    <div class="card" onclick="openProject('expense')">
        <h3>💰 Expense Tracker</h3>
        <p>Track income and expenses with analytics.</p>
    </div>

    <div class="card" onclick="openProject('scraper')">
        <h3>🕷 Web Scraper</h3>
        <p>Extract data from websites automatically.</p>
    </div>

</section>

<footer>
    © 2026 Saad Khan
</footer>

<!-- =======================
   PAGE TRANSITION SCRIPT
======================= -->
<script>
window.addEventListener("load", () => {
    document.body.classList.add("loaded");
});

document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e) {
        const href = this.getAttribute("href");

        if (href && !href.startsWith("#")) {
            e.preventDefault();
            document.body.classList.add("fade-out");

            setTimeout(() => {
                window.location.href = href;
            }, 500);
        }
    });
});

/* project click (demo) */
function openProject(name) {
    alert("Opening " + name + " project 🚀 (Next step: real page)");
}
</script>

</body>
</html>
