<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Python Galaxy Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* =======================
   PAGE TRANSITIONS
======================= */
body {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
}

/* page loaded */
body.loaded {
    opacity: 1;
    transform: translateY(0);
}

/* page exit */
body.fade-out {
    opacity: 0;
    transform: translateY(-20px);
}

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #050816, #000000);
    color: white;
    overflow-x: hidden;
}

/* ===== GALAXY BACKGROUND ===== */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: url('https://raw.githubusercontent.com/VincentGarreau/particles.js/master/demo/media/star.png');
    opacity: 0.12;
    animation: moveStars 120s linear infinite;
    z-index: -1;
}

@keyframes moveStars {
    from { transform: translate(0,0); }
    to { transform: translate(-1000px, -2000px); }
}

/* ===== HEADER ===== */
header {
    text-align: center;
    padding: 40px;
}

header h1 {
    color: #00f7ff;
    text-shadow: 0 0 15px #00f7ff;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    border: 1px solid #00f7ff;
    padding: 8px 14px;
    border-radius: 20px;
    transition: 0.3s;
}

nav a:hover {
    background: #00f7ff;
    color: black;
    box-shadow: 0 0 20px #00f7ff;
}

/* ===== CONTACT BOX ===== */
.container {
    display: flex;
    justify-content: center;
    margin-top: 60px;
}

.form-box {
    width: 400px;
    padding: 30px;
    background: rgba(255,255,255,0.05);
    border: 1px solid #00f7ff;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px #00f7ff;
}

/* inputs */
input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border: none;
    outline: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: white;
    font-family: 'Orbitron', sans-serif;
    border: 1px solid transparent;
}

input:focus, textarea:focus {
    border: 1px solid #00f7ff;
    box-shadow: 0 0 10px #00f7ff;
}

/* button */
button {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(90deg, #00f7ff, #ff00ff);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #ff00ff;
}

/* glow text */
h2 {
    text-align: center;
    color: #ff00ff;
    text-shadow: 0 0 10px #ff00ff;
}

</style>
</head>

<script>
/* page load animation */
window.addEventListener("load", () => {
    document.body.classList.add("loaded");
});

/* page transition on link click */
document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e) {
        const href = this.getAttribute("href");

        if (href && !href.startsWith("#")) {
            e.preventDefault();
            document.body.classList.add("fade-out");

            setTimeout(() => {
                window.location.href = href;
            }, 500);
        }
    });
});
</script>

<body>

<header>
    <h1>📩 Contact Me</h1>

    <nav>
        <nav>
    <a href="index.html">Home</a>
    <a href="projects.html">Projects</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>
    </nav>
</header>

<section class="container">

    <div class="form-box">
        <h2>Send a Message 🚀</h2>

        <input type="text" placeholder="Your Name">
        <input type="email" placeholder="Your Email">
        <textarea rows="5" placeholder="Your Message"></textarea>

        <button onclick="sendMessage()">Send Message</button>
        </button>
    </div>

</section>

</body>
</html>
<script>
function sendMessage() {

    const name = document.querySelector("input[type='text']").value;
    const email = document.querySelector("input[type='email']").value;
    const message = document.querySelector("textarea").value;

    fetch("http://127.0.0.1:5000/contact", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            email: email,
            message: message
        })
    })
    .then(res => res.json())
    .then(data => {
        alert("Message sent successfully 🚀");
    })
    .catch(err => {
        alert("Error sending message ❌");
    });
}
</script>
